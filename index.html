<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <title>Ludo</title>
  <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.6.4/jquery.min.js"
        type="text/javascript">
</script>
  <style type="text/css">
/*<![CDATA[*/
  .hover {    
    width: 48px;
    height: 48px;
    display: inline-block;
    vertical-align: top;	
  }
  .centered{
    display:block;
    position:absolute;
    top:45%;
    left:45%;
    width:222px;  
	text-align: center;
  }
  a,img {
	border:none; /*ie fix*/
	text-decoration: none;
  }
  /*]]>*/
  </style>
  <script type="text/javascript">
//<![CDATA[
        $(document).ready(function() {
    var over = "64px";
    var out = "48px";
    $(".hover").mouseover(function() {
        $(this).animate({ width: over , height: over  }, "fast");
    }).mouseout(function() {
        $(this).animate({ width: out, height: out }, "fast");    
    });
  });
  //]]>
  </script>
</head>
<body>
  <div class="centered">
    <a href="http://www.linkedin.com/in/ludolphneethling">
        <img class="hover" src="http://ludo.co.za/linkedin.png" />
    </a> 
    <a href="http://twitter.com/#!/ludolphn">
        <img class="hover" src="http://ludo.co.za/twitter.png" />
    </a>
    <!-- ><a href="http://jsfiddle.net/user/ludo/fiddles/">
        <img class="hover" src="http://ludo.co.za/jsfiddle.png" />
    </a> -->
</div>
</body>
</html>
